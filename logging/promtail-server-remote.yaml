server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://10.10.0.4:3100/loki/api/v1/push

scrape_configs:
  - job_name: smolcluster
    static_configs:
      - targets:
          - localhost
        labels:
          job: smolcluster
          __path__: /home/*/Desktop/smolcluster/logging/cluster-logs/*.log
      - targets:
          - localhost
        labels:
          job: smolcluster
          __path__: /Users/*/Desktop/smolcluster/logging/cluster-logs/*.log

    pipeline_stages:
      - regex:
          source: filename
        expression: '.*/(?P<session>.+?)__(?P<host>[^/]+)\.log$'
      - labels:
          host:
          session:
      - match:
          selector: '{job="smolcluster"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\S+\s+\S+) \| (?P<level>\S+) \| rank:(?P<rank>\w+) \| (?P<message>.+)$'
            - labels:
                rank:
                level:
            - timestamp:
                source: timestamp
                format: '2006-01-02 15:04:05,000'
                location: Asia/Kolkata
