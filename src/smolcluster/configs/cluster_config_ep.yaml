# syncPS:
host_ip:
  macmini1: "10.10.0.1"
  mini2: "10.10.0.1"
  mini3: "10.10.0.1"
  pi4: "10.10.0.1"
  macbook: "10.10.0.1"
  pi5: "192.168.50.1"
  win: "10.10.0.1"
  ipad: "172.20.10.3"
  jetson2: "10.10.1.2"
  jetson3: "10.10.1.3"

port:
  default: 65432
  macmini1: 65432
  mini2: 65432
  mini3: 65432
  pi4: 65432
  macbook: 65432
  pi5: 65432
  win: 65432
  ipad: 8000  # iPad uses port 8000 (port forwarding from external network)

# Network buffer sizes (in MB) - device-specific optimizations
buffer_size:
  macmini1: 8  # Mac Mini - 8MB (Thunderbolt 40Gbps)
  mini2: 8  # Mac Mini - 8MB
  mini3: 8  # Mac Mini - 8MB
  macbook: 8  # MacBook - 8MB
  pi4: 2  # Raspberry Pi 4 - 2MB (Gigabit Ethernet)
  pi5: 2  # Raspberry Pi 5 - 2MB (Gigabit Ethernet)
  win: 1  # Windows 11 - 1MB (conservative for compatibility)
  jetson2: 4  # Jetson - 4MB (optimized for its network capabilities)
  jetson3: 4  # Jetson - 4MB

# Network metrics tracking
track_network_metrics: true  # Enable bandwidth, latency, buffer usage tracking
metrics_log_interval: 50  # Log network metrics every N steps

# Bounded staleness for gradient synchronization
# Set to 0 to disable (strict synchronous training)
staleness_bound: 0  # Set to 0 for strict sync (EP typically uses sync)

# Timeout for gradient collection
timeout: 0.1  # How long to wait for communication (seconds)

# Randomness seed
seed: 42

# Cluster configuration
num_workers: 3

allToAllTopology:
  workers:
    regular:
    - hostname: mini2
      rank: 0
      ip: 10.10.0.2
      port: 65432
    - hostname: mini3
      rank: 1
      ip: 10.10.0.3
      port: 65433
    - hostname: macmini1
      rank: 2
      ip: "10.10.0.1"
      port: 65434
    tablets: []
num_nodes: 3  # Total number of nodes in the cluster
num_layers: 4  # Number of decoder layers in Mixtral
model_name: causal_mixtral  # MoE model type
