host_ip:
  macmini1: "10.10.0.1"
  mini2: 10.10.0.2
  mini3: 10.10.0.3
  pi4: "10.10.0.1"
  macbook: "10.10.0.1"
  pi5: "192.168.50.1"
  win: "10.10.0.1"
  ipad: "172.20.10.3"
  jetson: 10.10.1.1
  jetson3: 10.10.1.3
  jetson2: 10.10.1.2
port:
  default: 65432
  macmini1: 65432
  mini2: 65432
  mini3: 65432
  pi4: 65432
  macbook: 65432
  pi5: 65432
  win: 65432
  ipad: 8000
  jetson: 65432
  jetson2: 65432
  jetson3: 65432
web_interface:
  api_port: 8080      # FastAPI backend port
  frontend_port: 5050  # HTML frontend port

# Network buffer sizes (in MB) - device-specific optimizations
buffer_size:
  macmini1: 8  # Mac Mini - 8MB (Thunderbolt 40Gbps)
  mini2: 8  # Mac Mini - 8MB
  mini3: 8  # Mac Mini - 8MB
  macbook: 8  # MacBook - 8MB
  pi4: 2  # Raspberry Pi 4 - 2MB (Gigabit Ethernet)
  pi5: 2  # Raspberry Pi 5 - 2MB (Gigabit Ethernet)
  win: 1  # Windows 11 - 1MB (conservative for compatibility)
  jetson: 4  # Jetson - 4MB (Ethernet)
  jetson2: 4  # Jetson 2 - 4MB (Ethernet)
  jetson3: 4  # Jetson 3 - 4MB (Ethernet)

# Network metrics tracking
track_network_metrics: true  # Enable bandwidth, latency, buffer usage tracking
metrics_log_interval: 50  # Log network metrics every N steps


# Cluster configuration
num_workers: 1
total_num_nodes: 2

server: mini3    # Server hostname (rank 0 for SyncPS inference)
workers:
  regular:
  - hostname: macmini1
    user: macmini1
    rank: 1
    ip: "10.10.0.1"
    port: 65432
  tablets: []

num_nodes: 3
num_layers: 6  # Number of transformer blocks (auto-detected from model, this is just for reference)
model_name: causal_gpt2
