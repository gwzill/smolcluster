mp:
  active_model: causal_gpt2
  causal_gpt2:
    hf_model_name: openai-community/gpt2
    weights_model_name: gpt2  # Key in model_weights.yaml for downloading safetensors
    num_nodes: 3
    num_layers: 12
    max_new_tokens: 256
    ctx_length: 1024

    # Active decoding strategy to use
    active_decoding_strategy: top_k

    # Decoding strategies with their hyperparameters
    decoding_strategies:
      greedy:
        temperature: 1.0

      sampling:
        temperature: 1.0

      top_p:
        temperature: 1.0
        p: 0.9

      top_k:
        temperature: 1.0
        k: 40

dp:
  hf_model_name: mlx-community/Qwen2.5-1.5B-Instruct-4bit

  # Max tokens to generate per inference request.
  max_new_tokens: 256

  # CoreML-only context length (not used as generation length in PyTorch inference).
  ctx_length: 1024

  # Set true for chat/instruction models.
  is_instruction_based: true

  # Tokenizer config.
  tokenizer:
    # When true: use HF tokenizer defaults and HF generation_config defaults.
    # When false: use local decoding defaults unless overrides are provided.
    use_hf_defaults: true
    # Tokenizer-specific overrides.
    overrides:
      add_generation_prompt: true
      use_fast: true

    # Optional decoding overrides.
    # Leave unset to use HF generation defaults when use_hf_defaults=true.
    # decoding_overrides:
    #   temperature: 0.6
    #   top_p: 0.9
    #   top_k: 50

  # UI/default decoding strategy label.
  # Runtime inference falls back to this when request decoding_strategy is omitted.
  active_decoding_strategy: top_p

  # Decoding strategy overrides/fallbacks.
  # When use_hf_defaults=true, HF generation_config values are used unless explicitly overridden here.
  decoding_strategies:
    greedy: {}
    sampling: {}
    top_p: {}
    top_k: {}