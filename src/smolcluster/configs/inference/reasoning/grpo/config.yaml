

# GRPO (Group Relative Policy Optimization) Configuration

# Model configuration
dtype: "bfloat16"  # "float32" or "bfloat16" for all computations

wandb:
  project: "grpo-summarization"  # WandB project name for logging training metrics

# Training hyperparameters
seed: 42                # global random seed for numpy, mlx, python random, and dataset shuffling
device: "gpu"
use_kl: true           # use vLLM old_logprobs for clipped-ratio PPO (no ref_model loaded when vllm=true)
kl_beta: 0.0001           # 0 = pure clipped-ratio PPO; raise to ~0.01 to add KL penalty term
clip_ratio: 0.2
max_grad_norm: 1.0    # gradient clipping threshold (0 or null to disable)

# Automatic mixed precision — dynamic loss scaling to prevent bfloat16 grad underflow
amp: false
amp_init_scale: 32768   # initial loss scale (2^15)
amp_growth_interval: 2000  # double scale every N clean steps
amp_master_weights: false   # maintain/update FP32 master params, then cast back to model dtype
optimizer: "adam"      # "adam" (AdamW + optional AMP) or "sgd" (plain SGD, AMP ignored)
learning_rate: 0.000002   # LoRA LR: 1e-4 is standard (100× higher than full-param fine-tuning)
seed: 42                  # global RNG seed for reproducible batching/rollouts/training
num_epochs: 1
batch_size: 2
grad_accum_steps: 1    # accumulate gradients over N micro-batches before each optimizer step (1 = disabled)
do_eval: false         # set true to run validation every val_steps
val_steps: 200
grad_checkpoint: true
grad_chunk_size: 1      # Prompts per outer backward chunk (T=2, so 2 outer iterations)
rollout_grad_chunk: 2   # Rollouts per inner backward chunk — each nn.value_and_grad sees chunk_T×rollout_grad_chunk sequences
reward_workers: 8       # Number of threads for parallel reward computation (null = auto)
prefetch_rollouts: true  # fetch next step's rollouts in background during compute (grad_accum_steps=1 only)

# LoRA adapters — applied when model has uint32 (4-bit) weights, or force_lora=true.
# For a bf16 0.5B model: force_lora=true cuts trainable params 494M→~2.8M,
# reducing gradient+optimizer memory from ~5 GB to ~24 MB.
force_lora: false
lora_rank: 16          # rank 16: enough capacity for arithmetic reasoning, not too heavy
lora_scale: 4.0        # scale=4.0 (conservative for RL; full SFT typically uses 8-20)
lora_dropout: 0.0      # no dropout — GRPO gradients are already noisy
lora_num_layers: -1    # -1 = all transformer layers

# Dataset
data:
  dataset_name: "mlabonne/smoltldr"
  subset: "default"
  train_split: "train"
  val_split: "test"

# Rollout generation
max_input_tokens: 512
max_output_tokens: 512 #for hard limit on summarization task
num_rollouts: 4  # for each worker 
vllm: true  # Whether to use vLLM for rollout generation (if false, uses HF Transformers)

# Used when `vllm: true`: the training server sends rollout requests to worker-node vLLM servers.
# Workers, host_ip, and user are read from cluster_config_inference.yaml
vllm_cluster:
  port: 8080
  completion_path: "/v1/completions"

# ---------------------------------------------------------------------------
# Weight sync: save policy weights and reload vLLM workers periodically.
# Set sync_steps: 0 to disable.
# ---------------------------------------------------------------------------
weight_sync:
  save_every_steps: 100              # save/overwrite latest checkpoint every N optimizer steps (0 = disabled)
  sync_steps: 5                    # sync/reload workers every N training steps (0 = disabled)
  checkpoint_dir: "checkpoints/grpo-summarization-length-only"  # relative to project root

  # remote_user and host_ip are read from model_config_inference.yaml cluster.*
  remote_model_dir: "~/grpo_model"  
  vllm_activate: "~/.venv-vllm-metal/bin/activate"  # sourced before vLLM restart on workers
  remote_weights_filename: "model.safetensors"  # weights file to overwrite

  # Command used to (re)start vLLM on each worker.
  # Placeholders: {model_dir}, {port}, {rank}, {vllm_activate}, {max_model_len}
  # --adapter-path is injected automatically when LoRA adapters are present.
  # max-model-len = 2 * max_input_tokens (512 * 2 = 1024). Update if max_input_tokens changes.
  # Note: {model_dir}, {port}, {rank}, {vllm_activate} are substituted by worker_sync.py at runtime.
  vllm_start_cmd: >-
    tmux kill-session -t vllm_worker 2>/dev/null || true;
    tmux new-session -d -s vllm_worker
    "bash -c 'source {vllm_activate} && vllm serve {model_dir} --port {port}
    --dtype bfloat16 --trust-remote-code --enable-prefix-caching
    --max-model-len 1024
    --gpu-memory-utilization 0.8 2>&1 | tee /tmp/vllm_{rank}.log; exec bash'"

  health_retries: 30                # polling attempts before giving up
  health_interval: 5                # seconds between each health check